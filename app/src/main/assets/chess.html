<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Chess Duel</title>
<style>
:root{--bg:#111827;--bg2:#312e81;--card:rgba(255,255,255,.12);--txt:#f8fafc;--mut:#cbd5e1;--a:#06b6d4;--b:#4f46e5;--l:#f0d9b5;--d:#946f51;--sel:#fde047;--ok:#22c55e;--hit:#ef4444}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 0,rgba(59,130,246,.55),transparent 24rem),radial-gradient(circle at 90% 15%,rgba(168,85,247,.45),transparent 24rem),linear-gradient(135deg,var(--bg),var(--bg2));font-family:Inter,system-ui,Segoe UI,sans-serif;color:var(--txt);padding:14px}.wrap{max-width:980px;margin:auto}.top,.card{background:var(--card);border:1px solid rgba(255,255,255,.16);box-shadow:0 24px 60px rgba(0,0,0,.34);backdrop-filter:blur(16px);border-radius:26px}.top{padding:18px;margin-bottom:14px}.tag{text-transform:uppercase;letter-spacing:.17em;color:#a5b4fc;font-weight:900;font-size:.72rem;margin:0 0 6px}h1{font-size:clamp(2.2rem,11vw,4.4rem);line-height:.9;margin:0 0 8px}.sub{color:var(--mut);margin:0 0 14px}.controls{display:flex;gap:9px;flex-wrap:wrap}button{border:0;border-radius:15px;padding:11px 14px;color:var(--txt);background:rgba(255,255,255,.15);font:inherit;font-weight:700}.primary{background:linear-gradient(135deg,var(--b),var(--a));box-shadow:0 10px 28px rgba(6,182,212,.25)}.grid{display:grid;grid-template-columns:1fr minmax(300px,620px);gap:14px}.side{padding:16px}.badge{display:inline-flex;gap:8px;align-items:center;border-radius:999px;background:rgba(255,255,255,.15);padding:9px 12px;font-weight:900}.badge:before{content:"";width:12px;height:12px;border-radius:50%;background:currentColor;box-shadow:0 0 18px currentColor}.status{color:var(--mut)}.boardbox{padding:12px}.board{display:grid;grid-template-columns:repeat(8,1fr);aspect-ratio:1;border-radius:20px;overflow:hidden;border:7px solid rgba(15,23,42,.65);box-shadow:inset 0 0 0 1px rgba(255,255,255,.12),0 18px 50px rgba(0,0,0,.34)}.sq{position:relative;display:grid;place-items:center;border:0;border-radius:0;padding:0;font-size:clamp(2rem,10vw,4.2rem);line-height:1;user-select:none}.light{background:var(--l)}.dark{background:var(--d)}.piece{filter:drop-shadow(0 6px 7px rgba(0,0,0,.35));transform:translateY(-2px)}.wp .piece{color:#fffaf0;text-shadow:0 2px 0 #7c5b3d}.bp .piece{color:#1f2937;text-shadow:0 2px 0 rgba(255,255,255,.25)}.sel:after{content:"";position:absolute;inset:7px;border:4px solid var(--sel);border-radius:12px;box-shadow:0 0 20px rgba(253,224,71,.55)}.move:before{content:"";position:absolute;width:28%;height:28%;border-radius:50%;background:rgba(34,197,94,.75);box-shadow:0 0 24px rgba(34,197,94,.55)}.cap:before{width:78%;height:78%;background:transparent;border:5px solid rgba(239,68,68,.78)}.coord{position:absolute;font-size:.66rem;font-weight:900;opacity:.55;color:#111827}.file{right:6px;bottom:4px}.rank{left:6px;top:4px}ol{max-height:260px;overflow:auto;color:var(--mut);padding-left:22px}@media(max-width:780px){.grid{grid-template-columns:1fr}.side{order:1}.boardbox{order:2}.top,.card{border-radius:20px}.board{border-width:5px}.controls button{flex:1}}
</style>
</head>
<body>
<main class="wrap">
<section class="top"><p class="tag">local 2-player chess</p><h1>Chess Duel</h1><p class="sub">White always starts. Tap a piece, then tap a highlighted square. No AI yet — just player vs player on the same phone.</p><div class="controls"><button class="primary" id="new">New game</button><button id="flip">Flip board</button><button id="undo">Undo</button></div></section>
<section class="grid"><aside class="card side"><div id="badge" class="badge">White to move</div><h2>Status</h2><p id="status" class="status">Choose a white piece.</p><h2>Moves</h2><ol id="moves"></ol></aside><div class="card boardbox"><div id="board" class="board"></div></div></section>
</main>
<script>
const U={w:{K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙'},b:{K:'♚',Q:'♛',R:'♜',B:'♝',N:'♞',P:'♟'}},F='abcdefgh',R='87654321';
let b,t,sel=null,lm=[],flip=false,hist=[],mh=[];const $=id=>document.getElementById(id),bd=$('board'),st=$('status'),ba=$('badge'),ml=$('moves');
function start(){b=Array.from({length:8},()=>Array(8).fill(null));let back='RNBQKBNR';for(let c=0;c<8;c++){b[0][c]='b'+back[c];b[1][c]='bP';b[6][c]='wP';b[7][c]='w'+back[c]}t='w';sel=null;lm=[];hist=[];mh=[];draw()}
function copy(x){return JSON.parse(JSON.stringify(x))}
function draw(){bd.innerHTML='';let rows=[0,1,2,3,4,5,6,7],cols=[0,1,2,3,4,5,6,7];if(flip){rows.reverse();cols.reverse()}for(const r of rows)for(const c of cols){let s=document.createElement('button'),p=b[r][c],m=lm.find(x=>x.r==r&&x.c==c);s.className='sq '+((r+c)%2?'dark':'light');if(sel&&sel.r==r&&sel.c==c)s.className+=' sel';if(m)s.className+=' move '+(b[r][c]?'cap':'');if(p){s.className+=' '+(p[0]=='w'?'wp':'bp');let q=document.createElement('span');q.className='piece';q.textContent=U[p[0]][p[1]];s.appendChild(q)}if((!flip&&r==7)||(flip&&r==0)){let e=document.createElement('span');e.className='coord file';e.textContent=F[c];s.appendChild(e)}if((!flip&&c==0)||(flip&&c==7)){let e=document.createElement('span');e.className='coord rank';e.textContent=R[r];s.appendChild(e)}s.onclick=()=>tap(r,c);bd.appendChild(s)}ba.textContent=(t=='w'?'White':'Black')+' to move';ba.style.color=t=='w'?'#fffaf0':'#111827';ml.innerHTML=mh.map(x=>'<li>'+x+'</li>').join('');if(!sel)st.textContent='Choose a '+(t=='w'?'white':'black')+' piece.'}
function tap(r,c){let p=b[r][c],m=lm.find(x=>x.r==r&&x.c==c);if(m&&sel){move(sel.r,sel.c,r,c);return}if(p&&p[0]==t){sel={r,c};lm=legal(r,c);st.textContent='Move '+name(p[1])+'.'}else{sel=null;lm=[]}draw()}
function move(fr,fc,tr,tc){hist.push({b:copy(b),t,sel:copy(sel),lm:copy(lm),mh:copy(mh)});let p=b[fr][fc],cap=b[tr][tc],num=Math.ceil((mh.length+1)/2),pre=t=='w'?num+'.':num+'...';b[tr][tc]=p;b[fr][fc]=null;if(p[1]=='P'&&(tr==0||tr==7))b[tr][tc]=p[0]+'Q';mh.push(pre+' '+(t=='w'?'White ':'Black ')+(p[1]=='P'?'':p[1])+sq(fr,fc)+(cap?'x':'-')+sq(tr,tc)+(p[1]=='P'&&(tr==0||tr==7)?'=Q':''));t=t=='w'?'b':'w';sel=null;lm=[];draw()}
function legal(r,c){let p=b[r][c];if(!p)return[];let col=p[0],ty=p[1],out=[];const add=(rr,cc)=>{if(rr<0||rr>7||cc<0||cc>7)return false;if(!b[rr][cc]){out.push({r:rr,c:cc});return true}if(b[rr][cc][0]!=col)out.push({r:rr,c:cc});return false};if(ty=='P'){let d=col=='w'?-1:1,s=col=='w'?6:1;if(r+d>=0&&r+d<8&&!b[r+d][c]){out.push({r:r+d,c});if(r==s&&!b[r+2*d][c])out.push({r:r+2*d,c})}for(let dc of[-1,1]){let rr=r+d,cc=c+dc;if(rr>=0&&rr<8&&cc>=0&&cc<8&&b[rr][cc]&&b[rr][cc][0]!=col)out.push({r:rr,c:cc})}}if(ty=='N')for(let o of[[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]])add(r+o[0],c+o[1]);if(ty=='K')for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)if(dr||dc)add(r+dr,c+dc);let dirs=[];if(ty=='B'||ty=='Q')dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);if(ty=='R'||ty=='Q')dirs.push([1,0],[-1,0],[0,1],[0,-1]);for(let d of dirs){let rr=r+d[0],cc=c+d[1];while(add(rr,cc)){rr+=d[0];cc+=d[1]}}return out}
function sq(r,c){return F[c]+R[r]}function name(x){return{K:'king',Q:'queen',R:'rook',B:'bishop',N:'knight',P:'pawn'}[x]}
$('new').onclick=start;$('flip').onclick=()=>{flip=!flip;draw()};$('undo').onclick=()=>{let x=hist.pop();if(!x)return;b=x.b;t=x.t;sel=x.sel;lm=x.lm;mh=x.mh;draw()};start();
</script>
</body>
</html>
