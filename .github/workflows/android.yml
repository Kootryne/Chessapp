name: Android

on: [push, pull_request, workflow_dispatch]

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
      - name: Make current bot much smarter
        run: python3 scripts/make_current_bot_much_smarter.py
      - name: Move AI search to worker
        run: python3 scripts/add_ai_worker.py
      - name: Add bot vs bot and fullscreen board
        run: python3 scripts/add_bot_vs_bot_fullscreen.py
      - name: Add bot controls and speed fixes
        run: python3 scripts/add_bot_controls_speed_fix.py
      - name: Add repeated-position handling
        run: python3 scripts/fix_repetition_loops.py
      - name: Add instant mode
        run: python3 scripts/add_instant_mode.py
      - name: Add fullscreen controls style and promotion
        run: python3 scripts/add_fullscreen_controls_style_promotion.py
      - name: Add polished motion and clean UI
        run: python3 scripts/polish_motion_clean_ui.py
      - name: Fix visible glide animation
        run: python3 scripts/fix_visible_glide_animation.py
      - name: Add cinematic move system
        run: python3 scripts/cinematic_move_system.py
      - name: Add smooth power move FX
        run: python3 scripts/smooth_power_move_fx.py
      - name: Add threat highlights haptics and fullscreen fixes
        run: python3 scripts/add_threat_haptics_fullscreen_fix.py
      - name: Fix haptics and colored threats
        run: python3 scripts/fix_haptics_colored_threats.py
      - name: Add editor haptics and attack FX
        run: python3 scripts/add_editor_haptics_attack_fx.py
      - name: Final editor and attack FX fix
        run: python3 scripts/final_fx_editor_fix.py
      - name: Fix custom setup reset and kings
        run: python3 scripts/fix_custom_start_and_kings.py
      - name: Add multiking editor palette fix
        run: python3 scripts/multiking_editor_palette_fix.py
      - name: Fix moved colors and attack overlay
        run: python3 scripts/fix_move_colors_and_attack_overlay.py
      - name: Fix editor dock visibility and animation lock
        run: python3 scripts/fix_editor_dock_and_animation_lock.py
      - name: Final unlock and dock mode fix
        run: python3 scripts/final_unlock_and_dock_mode_fix.py
      - run: gradle :app:assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: ChessDuel-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
